# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
# Add steps that run tests, create a NuGet package, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- main

pool:
  name: 'Default'               # Twój self-hosted agent (MARTYNA)

steps:
# 1) Zainstaluj .NET 8 SDK na agencie tylko na czas joba
- task: UseDotNet@2
  inputs:
    packageType: 'sdk'
    version: '8.x'
    performMultiLevelLookup: true

# (opcjonalnie) sprawdź, że jest widoczne
- script: dotnet --info
  displayName: 'Check .NET SDK'

# 2) Restore + Build + Test (dostosuj ścieżkę jeśli masz solution/projekt w podfolderze)
- script: dotnet restore
  displayName: 'Restore'

- script: dotnet build --configuration Release --no-restore
  displayName: 'Build'

- script: dotnet test --configuration Release --no-build --verbosity normal
  displayName: 'Test'

